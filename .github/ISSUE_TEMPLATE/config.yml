    about: >
      Please report credential leaks, code-execution paths, or authentication
      bypasses via GitHub's private security advisories — not a public issue.
      See SECURITY.md for scope and guidance.
  - name: Code of Conduct report
    url: https://github.com/WrongerSandwich/traverse-trip-planner/blob/main/CODE_OF_CONDUCT.md#enforcement
