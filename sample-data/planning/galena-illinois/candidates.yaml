  - id: irish-cottage-hotel
    name: The Irish Cottage Boutique Hotel
    description: A quirky Irish-themed inn just east of town with a pub on site — a backup if downtown is booked.
    price_tier: mid
    nights: 2
    booking_url: ""
    coords: { lat: 42.4090, lng: -90.4010 }
