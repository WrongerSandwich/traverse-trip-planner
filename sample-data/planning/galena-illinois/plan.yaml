cover_query: Galena Illinois Main Street
field_guide_notes:
  - Most Main Street shops open by 10am; mornings are quietest for photos.
  - Parking fills by midday on summer weekends — the Bench Street lot above downtown usually has room.
  - The river walk and trail are flat and stroller-friendly; the overlook involves a short uphill.
gotchas:
  - The Grant Home is closed Mondays and Tuesdays — keep history stops on the weekend.
  - Main Street can flood after heavy spring rain; check the river gauge before an early-season trip.
