services:
  traverse:
    build: .
    image: traverse:local
    container_name: traverse
    restart: unless-stopped
    ports:
      - "3456:3456"
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3456
    env_file:
      - .env
    volumes:
      # Single bind mount for everything user-managed: trip stages (ideas,
      # planning, completed, archived), home.md, settings.json, and the
      # runtime .cache/. Atomic writes do a tmp-then-rename, which requires
      # a directory mount (not per-file) — the kernel won't replace a single
      # bind-mounted file target.
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3456/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
