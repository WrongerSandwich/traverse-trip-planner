services:
  traverse:
    build: .
    image: traverse:local
    container_name: traverse
    restart: unless-stopped
    ports:
      - "3456:3456"
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3456
    env_file:
      - .env
    volumes:
      - ./ideas:/app/ideas
      - ./planning:/app/planning
      - ./completed:/app/completed
      - ./archived:/app/archived
      - ./home.md:/app/home.md
      - ./settings.json:/app/settings.json
      # Bind-mount the cache DIRECTORY rather than individual files: atomic
      # writes do a tmp-then-rename, and renaming onto a single bind-mounted
      # file fails with EBUSY (the kernel won't replace a bind-mount target).
      # A directory mount has no such restriction.
      - ./.cache:/app/.cache
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3456/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
