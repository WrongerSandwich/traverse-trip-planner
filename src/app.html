<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1F4332" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <title>Traverse</title>
    <script>
      // Pre-paint theme bootstrap. Mirrors the logic in src/lib/theme.js;
      // inlined here so it runs before the first paint and avoids FOUC.
      // Keep in sync with theme.js (THEME_KEY, THEME_COLOR_LIGHT/DARK).
      (function () {
        try {
          var key = 'traverse-theme';
          var stored = localStorage.getItem(key);
          if (stored !== 'light' && stored !== 'dark' && stored !== 'system') stored = 'system';
          var resolved = stored;
          if (stored === 'system') {
            resolved = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark' : 'light';
          }
          document.documentElement.dataset.theme = resolved;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', resolved === 'dark' ? '#0D1A12' : '#1F4332');
        } catch (e) {
          // localStorage denied or matchMedia missing — leave default (light).
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
