    name: DeSoto House Hotel
    description: An 1855 Main Street landmark billed as Illinois' oldest operating hotel — Lincoln and Grant both spoke from its balcony.
    price_tier: mid
    nights: 2
    booking_url: https://desotohouse.com
    coords: { lat: 42.4166, lng: -90.4286 }
